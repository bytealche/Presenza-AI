# render.yaml — Render Blueprint for Presenza-AI Backend
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: presenza-ai-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter          # $7/mo — always-on (required for heavy AI models)
    region: oregon
    healthCheckPath: /health   # Uses our dedicated liveness endpoint

    envVars:
      # ── App ───────────────────────────────────────────────────────────────
      - key: DEBUG
        value: false
      - key: LOG_LEVEL
        value: INFO

      # ── CORS ──────────────────────────────────────────────────────────────
      # Set to your Vercel frontend URL after first deploy, e.g.:
      # https://presenza.vercel.app
      - key: ALLOWED_ORIGINS
        sync: false

      # ── Database ──────────────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false        # Set manually in Render dashboard (contains password)

      # ── Auth / JWT ────────────────────────────────────────────────────────
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7

      # ── Email (Brevo SMTP) ────────────────────────────────────────────────
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false

      # ── Supabase ──────────────────────────────────────────────────────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
