# render.yaml — Render Blueprint for Presenza-AI Backend
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: presenza-ai-backend
    runtime: docker
    # Path to the Dockerfile relative to the root of the repo
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter          # $7/mo — always-on (required for heavy AI models)
    region: oregon         # us-west-2 — closest to Supabase ap-southeast-1 (reasonable latency)
    healthCheckPath: /docs # FastAPI Swagger endpoint — returns 200 when app is ready

    envVars:
      # --- Database ---
      - key: DATABASE_URL
        sync: false        # Set manually in Render dashboard (contains password)

      # --- Auth / JWT ---
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60

      # --- Email (Brevo SMTP) ---
      - key: SMTP_SERVER
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false

      # --- Supabase (optional — for avatar image uploads) ---
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
